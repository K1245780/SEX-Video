<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>তোর মাকে চুদি</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-sub: #6c757d;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --border: #e3e6f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .admin-container {
            width: 100%;
            max-width: 550px;
        }

        /* কার্ড স্টাইল */
        .admin-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
            padding: 30px;
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        /* ইনপুট ফিল্ডস */
        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-sub);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
            background-color: #fafafa;
        }

        .form-control:focus {
            border-color: var(--primary);
            background-color: #fff;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 38px;
            color: var(--text-sub);
        }

        textarea.form-control {
            padding-left: 15px;
            resize: vertical;
        }

        /* বোতাম */
        .admin-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .admin-btn:hover { opacity: 0.9; }

        /* হিডেন ক্লাস */
        .hidden {
            display: none !important;
        }

        /* ভিডিও তালিকা ম্যানেজমেন্ট */
        .video-manager-list {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fafafa;
            margin-bottom: 20px;
        }

        .manager-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-card);
        }

        .manager-item:last-child {
            border-bottom: none;
        }

        .manager-meta {
            max-width: 70%;
        }

        .manager-meta p {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .small-del-btn {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="admin-container">

    <div class="admin-card" id="lockScreen">
        <div class="card-title">
            <i class="fa-solid fa-shield-halved" style="color: var(--primary);"></i> ক্রিয়েটর স্টুডিও লগইন
        </div>
        <div class="form-group">
            <label for="adminSecretKey">মাস্টার পাসওয়ার্ড</label>
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="adminSecretKey" class="form-control" placeholder="আপনার গোপন কোডটি দিন...">
        </div>
        <button class="admin-btn btn-primary" id="loginTrigger">
            <i class="fa-solid fa-right-to-bracket"></i> অ্যাক্সেস ভেরিফাই করুন
        </button>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> ইউজার ফিডে ফিরে যান</a>
    </div>

    <div class="admin-card hidden" id="controlDashboard">
        <div class="card-title">
            <i class="fa-solid fa-cloud-arrow-up" style="color: var(--success);"></i> নতুন ভিডিও পাবলিশ করুন
        </div>
        
        <div class="form-group">
            <label for="githubUrl">গিটহাব ভিডিও ইউআরএল (MP4 Link)</label>
            <i class="fa-solid fa-link input-icon"></i>
            <input type="url" id="githubUrl" class="form-control" placeholder="https://raw.githubusercontent.com/...">
        </div>

        <div class="form-group">
            <label for="videoCaptionText">ভিডিওর ক্যাপশন</label>
            <textarea id="videoCaptionText" class="form-control" rows="3" placeholder="আকর্ষণীয় ক্যাপশন বা হ্যাশট্যাগ লিখুন..."></textarea>
        </div>

        <button class="admin-btn btn-success" id="publishTrigger" style="margin-bottom: 20px;">
            <i class="fa-solid fa-paper-plane"></i> সাইটে লাইভ করুন
        </button>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

        <div class="card-title" style="font-size: 18px;">
            <i class="fa-solid fa-list-check" style="color: var(--text-sub);"></i> আপলোড করা ভিডিওর তালিকা
        </div>
        
        <div class="video-manager-list" id="dashboardVideoList">
            </div>

        <button class="admin-btn btn-danger" id="logoutTrigger">
            <i class="fa-solid fa-power-off"></i> ড্যাশবোর্ড লক করুন
        </button>
        <a href="index.html" class="back-link" target="_blank"><i class="fa-solid fa-eye"></i> লাইভ ওয়েবসাইট দেখুন</a>
    </div>

</div>

<script>
    // এই পেজের ব্যাকগ্রাউন্ড ইঞ্জিন এবং লজিক আমরা পরবর্তী ধাপে যুক্ত করব।
</script>
</body>
</html>
